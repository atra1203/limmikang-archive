<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - 임미강</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Serif KR', serif; 
            background-color: #ffffff; 
            color: #AEA391; /* 작가님 고유 색상 유지 */
            line-height: 1.8;
        }
        /* 모든 페이지 공통 규격: container와 item-padding 적용 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        .header-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            letter-spacing: 0.1em;
        }
        .contact-group {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        /* 앞서 작업한 Artist in Residence, Workshops와 동일한 들여쓰기(10px) */
        .contact-item {
            font-size: 0.95rem;
            padding-left: 10px;
        }
        .label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.4rem;
            opacity: 0.7;
        }
        .info-link {
            transition: opacity 0.2s;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 1px;
        }
        .info-link:hover { opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header-title">Contact</h1>

        <div class="contact-group">
            
            <div class="contact-item">
                <span class="label">Artist</span>
                <p class="font-bold text-lg">임 미 강 (Mikang Lim)</p>
                <p>충남대학교 예술대학 디자인창의학과 교수</p>
            </div>

            <div class="contact-item">
                <span class="label">Address</span>
                <p>(34134) 대전광역시 유성구 대학로 99</p>
            </div>

            <div class="contact-item">
                <span class="label">Email</span>
                <a href="mailto:limmikang@naver.com" class="info-link">limmikang@naver.com</a>
            </div>

            <div class="contact-item">
                <span class="label">Blog</span>
                <a href="http://m.blog.naver.com/limmikang" target="_blank" class="info-link">m.blog.naver.com/limmikang</a>
            </div>

        </div>
    </div>

</body>
</html>
