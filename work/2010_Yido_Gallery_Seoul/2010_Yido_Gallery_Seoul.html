<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2010 Yido Gallery Seoul - Mikang Lim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #ffffff; font-family: 'Noto Serif KR', serif; color: #1a1a1a; margin: 0; }
        .gallery-header { padding: 80px 20px 40px; text-align: center; }
        .gallery-title { font-family: 'Cinzel', serif; font-size: 2.2rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
        .gallery-desc { font-size: 1rem; color: #8c8172; letter-spacing: 0.05em; margin-top: 10px; }
        
        .series-label { 
            max-width: 1050px; margin: 60px auto 30px; padding: 10px 40px;
            font-family: 'Cinzel', serif; font-size: 1.2rem; color: #b5a48d;
            border-bottom: 1px solid #f0f0f0; letter-spacing: 0.2em;
        }

        .image-feed { max-width: 1050px; margin: 0 auto; padding: 0 40px 100px; }
        .work-frame { margin-bottom: 100px; opacity: 0; transform: translateY(30px); transition: all 1.2s ease-out; }
        .work-frame.reveal { opacity: 1; transform: translateY(0); }
        .work-frame img { width: 100%; height: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid #fcfcfc; }
        .gallery-footer { text-align: center; padding: 80px 0; color: #dddddd; font-family: 'Cinzel', serif; letter-spacing: 0.3em; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header class="gallery-header">
        <h1 class="gallery-title">Yido Gallery, Seoul</h1>
        <p class="gallery-desc">이도갤러리 개인전, 서울 (2010)</p>
    </header>

    <div class="series-label">Main & F Series</div>
    <main class="image-feed">
        <div class="work-frame"><img src="2010 Yido-3.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-5.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-6.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-F1.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-F2.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-F3.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-F4.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-F5.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-F6.jpg"></div>
    </main>

    <div class="series-label">Spring Series</div>
    <section class="image-feed">
        <div class="work-frame"><img src="2010 Yido-Sp1.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-Sp2.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-Sp3.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-Sp4.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-Sp5.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-Sp6.jpg"></div>
    </section>

    <div class="series-label">Summer Series</div>
    <section class="image-feed">
        <div class="work-frame"><img src="2010 Yido-S1.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-S2.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-S3.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-S4.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-S5.jpg"></div>
    </section>

    <div class="series-label">Fall Series</div>
    <section class="image-feed">
        <div class="work-frame"><img src="2010 Yido-J1.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-J2.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-J3.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-J4.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-J5.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-J6.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-J7.jpg"></div>
    </section>

    <div class="series-label">Winter Series</div>
    <section class="image-feed">
        <div class="work-frame"><img src="2010 Yido-W1.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-W2.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-W3.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-W4.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-W5.jpg"></div>
        <div class="work-frame"><img src="2010 Yido-W6.jpg"></div>
    </section>

    <footer class="gallery-footer">© MIKANG LIM ARCHIVE</footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('reveal');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.work-frame').forEach(frame => observer.observe(frame));
    </script>
</body>
</html>
